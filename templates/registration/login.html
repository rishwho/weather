{% extends "registration/base_auth.html" %}

{% block title %}Login - Weather{% endblock %}

{% block content %}
    <h2>Login</h2>
    
    <form method="POST">
        {% csrf_token %}
        
        <div class="form-group">
            {{ form.as_p }}
        </div>
        
        <button type="submit" class="btn-auth btn-primary">
            Sign In
        </button>
    </form>
{% endblock %}

{% block footer %}
    <div class="footer-links">
        <p>New user? <a href="{% url 'register' %}">Create an account</a></p>
        <p><a href="{% url 'index' %}">Back to Home</a></p>
    </div>
{% endblock %}
